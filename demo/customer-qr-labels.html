<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Big Supermarket - Customer QR labels</title>
    <style>
      :root {
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #0f172a;
      }
      body {
        margin: 0;
        background: #f8fafc;
        padding: 1rem;
      }
      h1 {
        margin: 0;
        font-size: 1.35rem;
      }
      .subtle {
        margin: 0.4rem 0 1rem;
        color: #64748b;
      }
      .actions {
        margin-bottom: 0.9rem;
      }
      button {
        border: none;
        border-radius: 8px;
        background: #0f766e;
        color: #fff;
        padding: 0.45rem 0.8rem;
        font: inherit;
        cursor: pointer;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 0.75rem;
      }
      .card {
        background: #fff;
        border: 1px solid #d8e1eb;
        border-radius: 10px;
        padding: 0.6rem;
      }
      .card h2 {
        margin: 0;
        font-size: 0.95rem;
      }
      .meta {
        margin: 0.3rem 0;
        font-size: 0.8rem;
        color: #64748b;
      }
      .qr {
        background: #fff;
        display: inline-block;
        padding: 0.25rem;
        border-radius: 6px;
      }
      code {
        display: block;
        margin-top: 0.35rem;
        background: #eef2f7;
        padding: 0.25rem;
        border-radius: 4px;
        font-size: 0.68rem;
        word-break: break-all;
      }
      @media print {
        .actions,
        .subtle {
          display: none;
        }
        body {
          background: #fff;
          padding: 0;
        }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="./config.js"></script>
  </head>
  <body>
    <h1>The Big Supermarket - Customer QR labels</h1>
    <p class="subtle">Print this sheet and scan each code at POS camera/scanner.</p>
    <div class="actions"><button type="button" id="printBtn">Print labels</button></div>
    <section id="labels" class="grid"></section>

    <script type="module">
      import { createDataStore } from "./dataStore.js";
      import { encodeLotQr } from "../src/lib/qrV2.js";

      let store = createDataStore();
      const labels = document.getElementById("labels");
      try {
        await store.init();
      } catch {
        store = createDataStore({ forceLocal: true });
        await store.init();
      }

      const lots = await store.listLots();
      for (const lot of lots) {
        const product = lot.product;
        const payload = encodeLotQr(lot.productId, lot.lotId);
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <h2>${product.name}</h2>
          <p class="meta">Lot ${lot.lotId} · Use-by ${lot.useByDate}</p>
          <div class="qr"></div>
          <code>${payload}</code>
        `;
        labels.appendChild(card);
        // eslint-disable-next-line no-new
        new QRCode(card.querySelector(".qr"), {
          text: payload,
          width: 140,
          height: 140,
          correctLevel: QRCode.CorrectLevel.M,
        });
      }

      document.getElementById("printBtn").addEventListener("click", () => window.print());
    </script>
  </body>
</html>
